name: CGS CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────
  # 1. Tests + Coverage
  # ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov bandit pip-audit

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            --cov=core --cov=analyzers --cov=web --cov=daemon \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -q --tb=short \
            -x
        env:
          CGS_LOG_LEVEL: WARNING

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ──────────────────────────────────────────────
  # 2. Dependency vulnerability audit
  # ──────────────────────────────────────────────
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit -r requirements.txt --strict

  # ──────────────────────────────────────────────
  # 3. Static security analysis (bandit)
  # ──────────────────────────────────────────────
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit on source code
        run: |
          bandit -r core/ analyzers/ web/ daemon.py cli.py cgs-agent.py \
            -c .bandit \
            -f json -o bandit-report.json || true
          # Parse and fail on HIGH/MEDIUM in source code only
          python3 -c "
          import json, sys
          with open('bandit-report.json') as f:
              data = json.load(f)
          results = [r for r in data.get('results', [])
                     if '/tests/' not in r['filename']]
          high = sum(1 for r in results if r['issue_severity'] == 'HIGH')
          medium = sum(1 for r in results if r['issue_severity'] == 'MEDIUM')
          print(f'Source code: HIGH={high} MEDIUM={medium}')
          if high > 0 or medium > 0:
              for r in results:
                  if r['issue_severity'] in ('HIGH', 'MEDIUM'):
                      f = r['filename']
                      print(f'  [{r[\"test_id\"]}] {f}:{r[\"line_number\"]} — {r[\"issue_text\"][:80]}')
              sys.exit(1)
          print('No HIGH or MEDIUM security issues found.')
          "

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # ──────────────────────────────────────────────
  # 4. Docker build + push (only on main, after all checks pass)
  # ──────────────────────────────────────────────
  docker:
    needs: [test, pip-audit, bandit]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
